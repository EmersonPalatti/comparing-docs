name: Security

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  security-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: |
          uv sync --frozen
          uv pip install pip-audit bandit

      - name: Run tests
        run: uv run pytest

      - name: Dependency vulnerability scan
        run: uv run pip-audit --strict

      - name: Static security scan
        run: uv run bandit -q -r src
